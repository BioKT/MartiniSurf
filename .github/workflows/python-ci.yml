name: Python CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # -------------------------
    # 1. Checkout
    # -------------------------
    - name: Checkout code
      uses: actions/checkout@v4

    # -------------------------
    # 2. Setup Python
    # -------------------------
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"

    # -------------------------
    # 3. Install dependencies
    # -------------------------
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black mypy ruff

    # -------------------------
    # 4. Install package
    # -------------------------
    - name: Install MartiniSurf
      run: pip install -e .

    # -------------------------
    # 5. Static analysis
    # -------------------------
    - name: Lint (flake8)
      run: flake8 surfmartini --max-line-length 88

    - name: Check formatting (black)
      run: black --check surfmartini

    - name: Type checking (mypy)
      run: mypy surfmartini --ignore-missing-imports

    - name: Super-linter (ruff)
      run: ruff check surfmartini

    # -------------------------
    # 6. Run tests with coverage
    # -------------------------
    - name: Run tests
      run: pytest -v --cov=surfmartini --cov-report=xml

    # -------------------------
    # 7. Upload coverage (Codecov)
    # -------------------------
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: "coverage.xml"
        fail_ci_if_error: false

