name: Docs Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_enabled: ${{ steps.pages_status.outputs.enabled }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure GitHub Pages
      id: configure_pages
      continue-on-error: true
      uses: actions/configure-pages@v5

    - name: Detect whether GitHub Pages is enabled
      id: pages_status
      run: |
        if [ "${{ steps.configure_pages.outcome }}" = "success" ]; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
        else
          echo "enabled=false" >> "$GITHUB_OUTPUT"
          echo "GitHub Pages is not enabled for this repository yet. Documentation was built, but deployment was skipped."
        fi

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install documentation dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r docs/requirements.txt
        pip install -e .

    - name: Build Sphinx documentation
      run: |
        sphinx-build -b html docs docs/_build/html
        touch docs/_build/html/.nojekyll

    - name: Upload GitHub Pages artifact
      if: steps.pages_status.outputs.enabled == 'true'
      uses: actions/upload-pages-artifact@v4
      with:
        path: docs/_build/html

  deploy:
    needs: build
    if: needs.build.outputs.pages_enabled == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
